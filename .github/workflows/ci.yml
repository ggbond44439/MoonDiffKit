name: MoonDiffKit CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  moonbit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: moonbitlang/setup-moonbit@v1

      - name: Format check
        run: moon fmt --check

      - name: Run tests
        run: moon test

      - name: Run CLI demo
        run: moon run cmd/main
